services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT_LOCAL}:${MYSQL_PORT}"
    volumes:
      - ./.db:/var/lib/mysql

  migrator:
    build:
      context: .
      dockerfile: docker/local/Dockerfile.backend
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: ${MYSQL_PORT}
    entrypoint: ["/bin/bash", "/shell/migrate-db.sh"]

  backend:
    build:
      context: .
      dockerfile: docker/local/Dockerfile.backend
    environment:
      MYSQL_HOST: mysql
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /backend/src
          ignore: 
            - __pycache__/
            - "*.pyc"
            - "*.pyo"
            - .pytest_cache/
            - .mypy_cache/
    entrypoint:
      [
        "uvicorn",
        "src.main:app",
        "--reload",
        "--host",
        "0.0.0.0",
        "--port",
        "${BACKEND_PORT}",
      ]
    
# Prod settings:
#     [
#       "gunicorn",
#       "src.main:app",
#       "-k",
#       "uvicorn.workers.UvicornWorker",
#       "--workers",
#       "${NB_WORKERS}",
#       "--bind",
#       "0.0.0.0:${BACKEND_PORT}",
#     ]

  frontend:
    build:
      context: .
      dockerfile: docker/local/Dockerfile.frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /frontend
          ignore: 
           - node_modules/
        - action: rebuild
          path: ./frontend/package.json
    entrypoint: ["bun", "run", "dev", "--host"]
